<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="contact-page">
    <section class="contact-card">
      <h1>Contact Form</h1>
      <p>Apna naam, email, aur message yahan daliyay.</p>
      <form action="#" method="post" class="contact-form" id="contactForm">
        <label for="name">Naam</label>
        <input type="text" id="name" name="name" placeholder="Apna naam likhein" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="example@mail.com" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Apna message likhein" required></textarea>

        <button type="submit">Submit karein</button>
      </form>
      <div class="success-message" id="successMessage" role="status" aria-live="polite">Your message has been submitted successfully!</div>
    </section>
  </main>
  <script>
    const form = document.getElementById('contactForm');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', function(event) {
      event.preventDefault();
      successMessage.classList.add('visible');
      form.reset();
    });
  </script>
</body>
</html>
